<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนทำหมันและฉีดวัคซีน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading" class="loading-screen">กำลังโหลดข้อมูล...</div>

    <div id="app-container" class="container" style="display: none;">
        <h2 class="title">🐾 ระบบลงทะเบียนออนไลน์</h2>
        
        <form id="registration-form">
            
            <!-- ================= แดชบอร์ดสถานะคิว (Step 0) ================= -->
            <div id="step-0" class="step-content active">
                <div class="card neumorphic">
                    <h3 class="section-title">📊 สถานะคิวปัจจุบัน</h3>
                    
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>ทำหมัน (สุนัขและแมว)</span>
                            <span>45 / 100 คิว</span> <!-- ตัวเลขสมมติ รอต่อ Firebase -->
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width: 45%;"></div></div>
                    </div>

                    <div class="progress-container" style="margin-top: 20px;">
                        <div class="progress-label">
                            <span>ฉีดวัคซีนอย่างเดียว</span>
                            <span>120 / 300 คิว</span>
                        </div>
                        <div class="progress-track"><div class="progress-fill vaccine" style="width: 40%;"></div></div>
                    </div>
                </div>
                <button type="button" class="neumorphic-btn gold-btn btn-next" data-next="1">เริ่มลงทะเบียน ➔</button>
            </div>

            <!-- ================= สเตป 1: ข้อมูลเจ้าของ ================= -->
            <div id="step-1" class="step-content">
                <div class="card neumorphic">
                    <h3 class="section-title">1. ข้อมูลเจ้าของสัตว์เลี้ยง</h3>
                    <div class="input-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" id="owner-name" class="neumorphic-input" placeholder="ระบุชื่อ-นามสกุล" required>
                    </div>
                    <div class="input-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone-number" class="neumorphic-input" placeholder="08X-XXX-XXXX" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <label>บ้านเลขที่</label>
                            <input type="text" id="house-no" class="neumorphic-input" placeholder="เช่น 123/45" required>
                        </div>
                        <div class="input-group half">
                            <label>หมู่ที่</label>
                            <select id="village-no" class="neumorphic-input" required>
                                <option value="" disabled selected>เลือกหมู่</option>
                                <script>for(let i=1; i<=16; i++) document.write(`<option value="${i}">หมู่ที่ ${i}</option>`);</script>
                            </select>
                        </div>
                    </div>
                    <div class="input-group checkbox-group">
                        <input type="checkbox" id="is-rental" class="neumorphic-checkbox">
                        <label for="is-rental">ข้าพเจ้าอาศัยในบ้านเช่า/หอพัก</label>
                    </div>
                    <div class="input-group" id="room-no-group" style="display: none;">
                        <label>เลขห้องเช่า (ถ้ามี)</label>
                        <input type="text" id="room-no" class="neumorphic-input" placeholder="เช่น ห้อง A12">
                    </div>
                </div>
                <div class="row">
                    <button type="button" class="neumorphic-btn half btn-back" data-back="0">⬅ กลับ</button>
                    <button type="button" class="neumorphic-btn gold-btn half btn-next" data-next="2">ถัดไป ➔</button>
                </div>
            </div>

            <!-- ================= สเตป 2: ข้อมูลสัตว์เลี้ยง (เพิ่มได้หลายตัว) ================= -->
            <div id="step-2" class="step-content">
                <div class="card neumorphic">
                    <h3 class="section-title">2. ข้อมูลสัตว์เลี้ยง</h3>
                    
                    <!-- ฟอร์มกรอกสัตว์เลี้ยง -->
                    <div id="pet-form-box">
                        <div class="input-group">
                            <label>ชื่อสัตว์เลี้ยง</label>
                            <input type="text" id="pet-name" class="neumorphic-input" placeholder="เช่น ด่าง, โคล่า">
                        </div>
                        <div class="row">
                            <div class="input-group half">
                                <label>ประเภทสัตว์</label>
                                <select id="pet-type" class="neumorphic-input">
                                    <option value="" disabled selected>เลือกประเภท</option>
                                    <option value="สุนัข">สุนัข</option>
                                    <option value="แมว">แมว</option>
                                </select>
                            </div>
                            <div class="input-group half">
                                <label>เพศ</label>
                                <select id="pet-gender" class="neumorphic-input">
                                    <option value="" disabled selected>เลือกเพศ</option>
                                    <option value="ตัวผู้">ตัวผู้</option>
                                    <option value="ตัวเมีย">ตัวเมีย</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>ประเภทบริการที่ต้องการ</label>
                            <select id="service-type" class="neumorphic-input">
                                <option value="" disabled selected>เลือกบริการ</option>
                                <option value="ทำหมันและวัคซีน">ทำหมัน + ฉีดวัคซีน</option>
                                <option value="วัคซีนอย่างเดียว">ฉีดวัคซีนอย่างเดียว</option>
                            </select>
                            <p style="color: #ff6b6b; font-size: 13px; margin-top: 5px;">* ทำหมัน จำกัดสิทธิ์ 2 ตัว/บ้าน (ฉีดวัคซีนอย่างเดียว ไม่จำกัด)</p>
                        </div>
                        <button type="button" id="btn-add-pet" class="neumorphic-btn outline-btn" style="margin-top: 10px;">+ บันทึกข้อมูลสัตว์เลี้ยงตัวนี้</button>
                    </div>

                    <!-- รายการสัตว์เลี้ยงที่เพิ่มแล้ว -->
                    <div id="pet-list-container" style="margin-top: 20px;"></div>

                </div>
                <div class="row">
                    <button type="button" class="neumorphic-btn half btn-back" data-back="1">⬅ กลับ</button>
                    <!-- ปุ่มนี้จะทำงานได้ก็ต่อเมื่อมีสัตว์เลี้ยงในตะกร้าอย่างน้อย 1 ตัว -->
                    <button type="button" id="btn-go-consent" class="neumorphic-btn gold-btn half" style="opacity: 0.5; pointer-events: none;">ไปหน้าใบยินยอม ➔</button>
                </div>
            </div>

            <!-- ================= สเตป 3: ใบยินยอมและเซ็นชื่อ (แยกรายตัว) ================= -->
            <div id="step-3" class="step-content">
                <div id="dynamic-consent-container">
                    <!-- ใบยินยอมจะถูกสร้างอัตโนมัติด้วย JavaScript ตรงนี้ -->
                </div>
                <div class="row" style="margin-top: 20px;">
                    <button type="button" class="neumorphic-btn half btn-back" data-back="2">⬅ กลับ</button>
                    <button type="button" id="btn-submit" class="neumorphic-btn gold-btn half" disabled>ยืนยันการลงทะเบียน</button>
                </div>
            </div>

        </form>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
</body>
</html>
